<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>AI Resume Builder | Smart Resume Optimization & JD Matching</title>

    <meta
      name="description"
      content="Build ATS-optimized resumes instantly using AI. Analyze your resume, match it with job descriptions, and generate tailored resumes in seconds."
    />

    <meta
      name="keywords"
      content="AI resume builder, ATS resume, resume analyzer, job description matching, resume generator, SaaS resume tool"
    />

    <meta name="author" content="Your Brand Name" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Resume Builder SaaS" />
    <meta
      property="og:description"
      content="Analyze, optimize, and generate job-ready resumes using AI."
    />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Resume Builder SaaS" />
    <meta
      name="twitter:description"
      content="Create ATS-friendly resumes using AI and job matching."
    />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.png" />

    <!-- Theme Color (Mobile UI) -->
    <meta name="theme-color" content="#6366f1" />

    <!-- Preconnect (performance optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Example Font (optional) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
